services:
  - type: web
    name: horizon-django-backend
    env: python
    region: frankfurt
    plan: starter
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://edify-hub.vercel.app,http://localhost:5000
      - key: DATABASE_URL
        fromDatabase:
          name: horizon-postgres
          property: connectionString

databases:
  - name: horizon-postgres
    plan: starter
    region: frankfurt
