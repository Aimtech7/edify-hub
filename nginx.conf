server {
    listen 80;
    server_name localhost;
    resolver 8.8.8.8 1.1.1.1 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    set $backend_host "${BACKEND_HOST}";

    # Serve static frontend build
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy Django API requests
    location /api/ {
        proxy_pass $backend_host$request_uri;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Django Admin dashboard
    location /admin/ {
        proxy_pass $backend_host$request_uri;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Django static files (admin panel assets, etc.)
    location /static/admin/ {
        proxy_pass $backend_host$request_uri;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
    }
    location /static/rest_framework/ {
        proxy_pass $backend_host$request_uri;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
    }
    location /static/drf_yasg/ {
        proxy_pass $backend_host$request_uri;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
    }

    # Django Media uploads
    location /media/ {
        proxy_pass $backend_host$request_uri;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

