services:
  # Backend API Service (Django REST Framework)
  - type: web
    name: horizon-backend-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    region: frankfurt
    numInstances: 1
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: horizon-postgres-db
          property: connectionString

  # Frontend Static Web App (Vite React PWA)
  - type: web
    name: horizon-enterprise-portal
    env: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    plan: free
    region: frankfurt
    routes:
      - type: rewrite
        source: /api/*
        destination: https://horizon-backend-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: horizon-postgres-db
    databaseName: horizondb
    user: horizonuser
    plan: free
    region: frankfurt
