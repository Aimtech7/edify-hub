name: Horizon Enterprise CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-verify:
    name: Build & Verify Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Install Frontend Dependencies & Check Build
        run: |
          npm ci --include=dev
          npx tsc --noEmit
          npm run build

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: './backend/requirements.txt'

      - name: Install Backend Dependencies & Check System
        working-directory: ./backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          python manage.py check

  docker-build:
    name: Verify Docker Container Build
    runs-on: ubuntu-latest
    needs: test-and-verify

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Test Docker Compose Production Build
        run: |
          docker compose build

  deploy:
    name: Continuous Deployment (Production)
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Server Deployment
        run: |
          echo "Builds verified successfully. Ready for deployment."
          # If deploying to a VPS via SSH, configure GitHub Repo Secrets (SERVER_HOST, SERVER_USER, SERVER_SSH_KEY):
          # ssh -i key user@host "cd /var/www/horizon && git pull origin main && docker compose up -d --build"
