version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: horizon_db
    environment:
      POSTGRES_DB: ${DB_NAME:-horizon_db}
      POSTGRES_USER: ${DB_USER:-horizon_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-horizon_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-horizon_user} -d ${DB_NAME:-horizon_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: horizon_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data &&
             gunicorn --bind 0.0.0.0:8000 config.wsgi:application"
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY:-django-insecure-prod-ready-secret-key-987654321}
      - DB_NAME=${DB_NAME:-horizon_db}
      - DB_USER=${DB_USER:-horizon_user}
      - DB_PASSWORD=${DB_PASSWORD:-horizon_password}
      - DB_HOST=db
      - DB_PORT=5432
      - CORS_ALLOWED_ORIGINS=http://localhost:5000,http://localhost:3000,https://edify-hub-2.onrender.com
      - CORS_ALLOW_ALL_ORIGINS=True
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - static_volume:/app/static
      - media_volume:/app/media

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: horizon_frontend
    environment:
      - BACKEND_HOST=http://backend:8000
    ports:
      - "5000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  static_volume:
  media_volume:
